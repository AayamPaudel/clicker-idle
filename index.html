<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="body">
    <div id="header">
        <h1>
            Clicker Idle
        </h1>
        <span id="time">
            00:00:00
        </span>
    </div>

    <div id="box1" class="box">
        <h3 id="name">
            Player: Guest
        </h3>
        <div>
            <img src="avatar.png">
        </div>
    </div>

    <div id="box2" class="box">

        <span>
            Stats
        </span>

        <p id="totalclicks">
            Total Clicks: 0
        </p>

        <p id="clickpower">
            Click Power: 1
        </p>

        <p id="auto">
            Auto Clicker Power: 0
        </p>

    </div>

    <div id="box4" class="box">
        <h2>
            Your Money
        </h2>
        <p id="moneypara">
            $0
        </p>
        <button id="money">
            Make Money(+$1)
        </button>
        <div>
            <button id="save">
                Save Game
            </button>
            <button id="load">
                Load Game
            </button>
        </div>
    </div>

    <div id="box5" class="box">
        Console
        <textarea id="console" rows="6" disabled>Game Started...</textarea>
    </div>

    <div id="box6" class="box">
        Shop
        <button id="autoclicker" onclick="autoclicker()">
            Buy Autoclicker ($50)
        </button>
        <button id="clickupgrade" onclick="powerup()">
            Upgrade Click Power ($10)
        </button>
    </div>

    <script src="script.js">

    </script>

</body>

</html>
